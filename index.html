<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zapp Wattson - Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;700;800&family=Nunito:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cyan:   #72dbe7;
      --bg:     #16152a;
      --text:   #ede9ff;
      --muted:  rgba(237, 233, 255, 0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    .glow {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(100px);
      animation: drift 18s ease-in-out infinite alternate;
    }
    .glow-1 { width: 500px; height: 500px; background: rgba(138,91,241,0.15); top: -120px; left: -80px; }
    .glow-2 { width: 420px; height: 420px; background: rgba(114,219,231,0.10); bottom: -80px; right: -60px; animation-delay: -9s; }

    @keyframes drift {
      0%   { transform: translate(0, 0); }
      100% { transform: translate(30px, -30px); }
    }

    .stage {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .info {
      padding-left: clamp(1.5rem, 4vw, 3.5rem);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .coming-soon-label {
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--cyan);
      font-weight: 700;
      font-family: 'Exo 2', sans-serif;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }
    .coming-soon-label::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 0.75rem;
      animation: fadeUp 0.6s 0.18s ease both;
    }
    .name-bar {
      width: 4px;
      height: clamp(2rem, 4vw, 2.8rem);
      background: var(--cyan);
      border-radius: 2px;
      box-shadow: 0 0 10px rgba(114,219,231,0.5);
    }
    h1 {
      font-family: 'Exo 2', sans-serif;
      font-weight: 800;
      font-size: clamp(1.8rem, 4.5vw, 3.2rem);
      line-height: 1.05;
      letter-spacing: -0.01em;
    }

    .tagline {
      font-size: clamp(0.85rem, 1.6vw, 1rem);
      color: var(--muted);
      font-style: italic;
      font-weight: 300;
      margin-bottom: 2rem;
      animation: fadeUp 0.6s 0.26s ease both;
    }

    .debut-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.45rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(138,91,241,0.35);
      background: rgba(138,91,241,0.1);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      color: #c4a8ff;
      font-family: 'Exo 2', sans-serif;
      font-weight: 700;
      animation: fadeUp 0.6s 0.34s ease both;
    }
    .debut-pill span {
      font-weight: 300;
      color: var(--muted);
      font-family: 'Nunito', sans-serif;
    }

    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 2;
      text-align: center;
      padding: 0.85rem;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: rgba(237,233,255,0.2);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      html, body { overflow: auto; }
      .stage { padding: 5rem 1.5rem 2rem; align-items: flex-start; }
      .info { padding-left: 0; align-items: center; text-align: center; }
      .name-row { justify-content: center; }
      .name-bar { display: none; }
    }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="stage">
    <div class="info">
      <div class="coming-soon-label">Coming Soon</div>
      <div class="name-row">
        <div class="name-bar"></div>
        <h1>Zapp Wattson</h1>
      </div>
      <p class="tagline">Let's have an electrifying time together!</p>
      <div class="debut-pill">Debut <span>·</span> 2026</div>
    </div>
  </div>

  <footer>© 2026 Zapp Wattson · All rights reserved</footer>
</body>
</html>
